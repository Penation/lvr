description: LVR Stage-1 SFT from GitHub on Singularity (1 node x 8xA100-40G, no flash-attn)

env_defaults:
  NODES: 1
  GPUS: 8
  MEM: 40
  JOB_NAME: lvr-stage1-1node8gpu-a10040-no-flash-v18
  REPO_URL: https://github.com/Penation/lvr.git
  REPO_REF: main
  REPO_DIR: /scratch/lvr
  CONDA_ENV: lvr_train
  DATA_ROOT: /mnt/lvr/2026vlm/datasets
  OUTPUT_ROOT: /mnt/lvr/2026vlm/ckpts/lvr
  CACHE_ROOT: /mnt/lvr/2026vlm/cache/lvr
  MAX_STEPS: 2500
  GRAD_ACCUM_STEPS: 8
  DATALOADER_WORKERS: 8
  MASTER_PORT: 29500

target:
  service: sing
  workspace_name: wsgcrrbt
  name: msrresrchvc

storage:
  lvr:
    storage_account_name: azsussc
    container_name: v-bochengpan
    mount_dir: /mnt/lvr

environment:
  image: amlt-sing/acpt-torch2.7.1-py3.10-cuda12.6-ubuntu22.04
  setup:
    - set -euo pipefail
    - rm -rf ${REPO_DIR}
    - git clone ${REPO_URL} ${REPO_DIR}
    - git -C ${REPO_DIR} checkout ${REPO_REF}
    - >-
      python -c "from pathlib import Path; s3=Path('${REPO_DIR}/src/s3_checkpoints_lvr.py'); u=s3.read_text(); u=u.replace('if __name__ == \"__main__\":', 'if __name__ == \"__main__\":\n    pass'); s3.write_text(u); tr=Path('${REPO_DIR}/src/trainer/lvr_trainer.py'); t=tr.read_text(); t=t.replace('        # if online checkpointing\n        if oci_handler:\n            self.oci_handler = oci_handler\n            self.temp_folder = temp_folder     # temp_file class; \"/dockerx/Local/users/bangzheng/model_name/run_name-[random]\"', '        # Always define these attributes. The checkpoint save hook reads self.temp_folder even when online_checkpoint=False.\n        self.oci_handler = oci_handler\n        self.temp_folder = temp_folder     # temp_file class; \"/dockerx/Local/users/bangzheng/model_name/run_name-[random]\"'); tr.write_text(t); p=Path('${REPO_DIR}/src/train/monkey_patch_forward_lvr.py'); s=p.read_text(); s=s.replace('from typing import Optional, List, Union, Tuple', 'from typing import Optional, List, Union, Tuple, Any'); s=s.replace('from transformers.utils import is_torchdynamo_compiling,TransformersKwargs', 'from transformers.utils import is_torchdynamo_compiling\ntry:\n    from transformers.utils import TransformersKwargs\nexcept ImportError:  # transformers<=4.51 does not export this typing alias\n    TransformersKwargs = Any'); s=s.replace('image_embeds = self.model.get_image_features(pixel_values, image_grid_thw)\n        image_embeds = torch.cat(image_embeds, dim=0)', 'pixel_values = pixel_values.type(self.visual.dtype)\n        image_embeds = self.visual(pixel_values, grid_thw=image_grid_thw)'); s=s.replace('selected_lvr_embeds = self.model.get_image_features(lvr_tokens, lvr_tokens_thw)\n                selected_lvr_embeds = torch.cat(selected_lvr_embeds, dim=0)', 'lvr_tokens = lvr_tokens.type(self.visual.dtype)\n                selected_lvr_embeds = self.visual(lvr_tokens, grid_thw=lvr_tokens_thw)'); s=s.replace('self.model.get_rope_index(', 'self.get_rope_index('); s=s.replace('self.model.rope_deltas', 'self.rope_deltas'); s=s.replace('self.model.language_model(', 'self.model('); s=s.replace('self.model.visual.device', 'self.visual.device'); s=s.replace('self.model.visual.dtype', 'self.visual.dtype'); s=s.replace('self.model.visual(', 'self.visual('); s=s.replace('        # Upcast to float if we need to compute the loss to avoid potential precision issues\n        logits = logits.float()\n        # Shift so that tokens < n predict n\n', '        # Keep logits in the model dtype to avoid a full-vocabulary fp32 copy on long packed sequences.\n        # CrossEntropyLoss supports bf16/fp16 logits and internally uses stable kernels.\n        # Shift so that tokens < n predict n\n'); s=s.replace('#             logits = logits.float()', '#             logits kept in model dtype'); p.write_text(s)"
    - python -m py_compile ${REPO_DIR}/src/train/monkey_patch_forward_lvr.py ${REPO_DIR}/src/trainer/lvr_trainer.py ${REPO_DIR}/src/train/train_lvr.py
    - python -c "from pathlib import Path; s=Path('${REPO_DIR}/src/train/monkey_patch_forward_lvr.py').read_text(); assert 'self.model.get_image_features' not in s, s.count('self.model.get_image_features'); assert 'self.model.get_rope_index' not in s, s.count('self.model.get_rope_index'); assert 'self.model.rope_deltas' not in s, s.count('self.model.rope_deltas'); assert 'self.model.language_model' not in s, s.count('self.model.language_model'); assert 'self.model.visual' not in s, s.count('self.model.visual'); assert '        logits = logits.float()' not in s, s.count('        logits = logits.float()'); print('qwen visual/rope/language/memory forward patch ok')"
    - conda tos accept --override-channels --channel https://repo.anaconda.com/pkgs/main || true
    - conda tos accept --override-channels --channel https://repo.anaconda.com/pkgs/r || true
    - conda env create -f ${REPO_DIR}/environment.yaml
    - conda run --no-capture-output -n ${CONDA_ENV} python -m pip install --upgrade pip setuptools wheel
    - conda run --no-capture-output -n ${CONDA_ENV} python -m pip install boto3==1.34.162
    - conda run --no-capture-output -n ${CONDA_ENV} python -c "import torch, transformers, deepspeed, trl, qwen_vl_utils; print('env ok', torch.__version__, torch.cuda.is_available())"

code:
  local_dir: $CONFIG_DIR/

data:
  storage_id: lvr

jobs:
  - name: ${JOB_NAME}
    sku: ${NODES}x${MEM}G${GPUS}-A100
    process_count_per_node: 1
    sla_tier: Premium
    execution_mode: basic
    identity: managed
    submit_args:
      env:
        AMLT_DOCKERFILE_TEMPLATE: default
        SHARED_MEMORY_PERCENT: 0.5
        PYTHONUNBUFFERED: "1"
        TOKENIZERS_PARALLELISM: "false"
        PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
        MASTER_PORT: ${MASTER_PORT}
    command:
      - nvidia-smi
      - df -h
      - test -f ${DATA_ROOT}/Visual-CoT/annotations/meta_data_lvr_sft_stage1.local.json
      - test -d ${DATA_ROOT}/Visual-CoT/images/cot_image_data
      - mkdir -p ${OUTPUT_ROOT}/stage1 ${CACHE_ROOT}/hf ${CACHE_ROOT}/run_data
      - >-
        python -c 'import json; from pathlib import Path; src=Path("${DATA_ROOT}/Visual-CoT/annotations/meta_data_lvr_sft_stage1.local.json"); dst=Path("${CACHE_ROOT}/run_data/meta_data_lvr_sft_stage1.amlt.json"); data=json.load(open(src)); old="/datadisk/dataset"; new="${DATA_ROOT}"; [row.update({"data_path": row["data_path"].replace(old,new), "image_folder": row["image_folder"].replace(old,new)}) for row in data]; dst.parent.mkdir(parents=True, exist_ok=True); json.dump(data, open(dst,"w"), indent=2); print("wrote", dst); print(json.dumps(data, indent=2))'
      - test -f ${CACHE_ROOT}/run_data/meta_data_lvr_sft_stage1.amlt.json
      - >-
        python -c 'import json, os; data=json.load(open("${CACHE_ROOT}/run_data/meta_data_lvr_sft_stage1.amlt.json")); missing=[row for row in data if not os.path.exists(row["data_path"]) or not os.path.isdir(row["image_folder"])]; assert not missing, missing; print("amlt meta preflight ok", len(data))'
      - >-
        bash -lc 'set -euo pipefail &&
        ENV_PREFIX=$${HOME}/.conda/envs/${CONDA_ENV} &&
        test -x $$ENV_PREFIX/bin/python &&
        test -x $$ENV_PREFIX/bin/deepspeed &&
        $$ENV_PREFIX/bin/python -c "import sys, torch, transformers, deepspeed; print(\"train python\", sys.executable); print(\"versions\", torch.__version__, transformers.__version__, deepspeed.__version__)" &&
        head -1 $$ENV_PREFIX/bin/deepspeed &&
        cd ${REPO_DIR} &&
        export PATH=$$ENV_PREFIX/bin:$${PATH} &&
        export PYTHONPATH=$$PWD:$$PWD/src:$${PYTHONPATH:-} &&
        export WANDB_MODE=offline &&
        export CACHE_DIR=${CACHE_ROOT}/hf &&
        $$ENV_PREFIX/bin/deepspeed --num_gpus=${GPUS} src/train/train_lvr.py
        --run_name "Stage1_8xA10040_mseLVRLossLambda0.1-MaxVisToken5120-MinVisToken128"
        --coconut True
        --loss_lvr_fct mse
        --deepspeed scripts/zero3_offload.json
        --model_id Qwen/Qwen2.5-VL-7B-Instruct
        --data_path ${CACHE_ROOT}/run_data/meta_data_lvr_sft_stage1.amlt.json
        --remove_unused_columns False
        --lvr_head False
        --freeze_vision_tower True
        --freeze_merger True
        --freeze_llm False
        --max_steps ${MAX_STEPS}
        --learning_rate 1e-5
        --loss_lvr_lambda 0.1
        --bf16 True
        --fp16 False
        --disable_flash_attn2 True
        --online_checkpoint False
        --output_dir ${OUTPUT_ROOT}/stage1
        --num_train_epochs 1
        --per_device_train_batch_size 1
        --gradient_accumulation_steps ${GRAD_ACCUM_STEPS}
        --image_min_pixels 100352
        --image_max_pixels 4014080
        --weight_decay 0.1
        --warmup_ratio 0.03
        --lr_scheduler_type cosine
        --logging_steps 1
        --tf32 False
        --gradient_checkpointing True
        --report_to none
        --lazy_preprocess True
        --save_strategy steps
        --save_steps 500
        --save_total_limit 10
        --dataloader_num_workers ${DATALOADER_WORKERS}
        --enable_data_packing True
        --max_packed_tokens 16384
        --random_seed 42
        --long_seq_threshold 4096
        --max_instance_per_batch 4
        2>&1 | tee -a ${OUTPUT_ROOT}/${JOB_NAME}.log'
