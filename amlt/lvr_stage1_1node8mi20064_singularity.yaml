description: LVR Stage-1 SFT from GitHub on Singularity (1 node x 8xMI200-64G, ROCm, no flash-attn)

env_defaults:
  NODES: 1
  GPUS: 8
  MEM: 64
  JOB_NAME: lvr-stage1-1node8gpu-mi20064-no-flash-v1
  REPO_URL: https://github.com/Penation/lvr.git
  REPO_REF: main
  REPO_DIR: /scratch/lvr
  CONDA_ENV: lvr_train
  DATA_ROOT: /mnt/lvr/2026vlm/datasets
  OUTPUT_ROOT: /mnt/lvr/2026vlm/ckpts/lvr
  CACHE_ROOT: /mnt/lvr/2026vlm/cache/lvr-mi200
  MAX_STEPS: 2500
  GRAD_ACCUM_STEPS: 8
  DATALOADER_WORKERS: 8
  MASTER_PORT: 29501

target:
  service: sing
  workspace_name: wsgcrrbt
  name: msrresrchvc

storage:
  lvr:
    storage_account_name: azsussc
    container_name: v-bochengpan
    mount_dir: /mnt/lvr

environment:
  image: rocm/pytorch:rocm6.2.4_ubuntu22.04_py3.10_pytorch_release_2.6.0
  setup:
    - set -euo pipefail
    - rm -rf ${REPO_DIR}
    - git clone ${REPO_URL} ${REPO_DIR}
    - git -C ${REPO_DIR} checkout ${REPO_REF}
    - python -m pip install --upgrade pip setuptools wheel
    - >-
      python -m pip install
      accelerate==1.6.0
      aiohappyeyeballs==2.6.1
      aiohttp==3.11.18
      aiosignal==1.3.2
      annotated-types==0.7.0
      attrs==25.3.0
      boto3==1.34.162
      certifi==2025.4.26
      charset-normalizer==3.4.1
      click==8.1.8
      datasets==3.5.1
      deepspeed==0.16.7
      dill==0.3.8
      docker-pycreds==0.4.0
      einops==0.8.1
      filelock==3.13.1
      frozenlist==1.6.0
      fsspec==2024.6.1
      gitdb==4.0.12
      gitpython==3.1.44
      hjson==3.1.0
      huggingface-hub==0.30.2
      idna==3.10
      jinja2==3.1.4
      markdown-it-py==3.0.0
      markupsafe==2.1.5
      mdurl==0.1.2
      mpmath==1.3.0
      msgpack==1.1.0
      multidict==6.4.3
      multiprocess==0.70.16
      networkx==3.3
      ninja==1.11.1.4
      numpy==2.1.2
      opencv-python-headless==4.11.0.86
      pandas==2.2.3
      peft==0.15.2
      pillow==11.0.0
      propcache==0.3.1
      protobuf==6.30.2
      py-cpuinfo==9.0.0
      pyarrow==20.0.0
      pydantic==2.11.3
      pydantic-core==2.33.1
      qwen-vl-utils==0.0.14
      pytz==2025.2
      pyyaml==6.0.2
      regex==2024.11.6
      requests==2.32.3
      rich==14.0.0
      safetensors==0.5.3
      sentry-sdk==2.27.0
      setproctitle==1.3.5
      smmap==5.0.2
      sympy==1.13.1
      tensorboardx==2.6.2.2
      tokenizers==0.21.1
      tqdm==4.67.1
      transformers==4.51.3
      trl==0.17.0
      typing-inspection==0.4.0
      tzdata==2025.2
      ujson==5.10.0
      urllib3==2.4.0
      wandb==0.19.10
      xxhash==3.5.0
      yarl==1.20.0
    - python -m py_compile ${REPO_DIR}/src/train/monkey_patch_forward_lvr.py ${REPO_DIR}/src/s3_checkpoints_lvr.py
    - python -c "import torch, transformers, deepspeed, trl, qwen_vl_utils; print('rocm env ok', torch.__version__, torch.version.hip, torch.cuda.is_available(), torch.cuda.device_count())"

code:
  local_dir: $CONFIG_DIR/

data:
  storage_id: lvr

jobs:
  - name: ${JOB_NAME}
    sku: ${NODES}x${MEM}G${GPUS}-MI200-xGMI
    process_count_per_node: 1
    sla_tier: Premium
    execution_mode: basic
    identity: managed
    submit_args:
      env:
        AMLT_DOCKERFILE_TEMPLATE: default
        SHARED_MEMORY_PERCENT: 0.5
        PYTHONUNBUFFERED: "1"
        TOKENIZERS_PARALLELISM: "false"
        HIP_VISIBLE_DEVICES: "0,1,2,3,4,5,6,7"
        ROCR_VISIBLE_DEVICES: "0,1,2,3,4,5,6,7"
        MASTER_PORT: ${MASTER_PORT}
        NCCL_DEBUG: WARN
        RCCL_LOG_LEVEL: WARN
    command:
      - rocm-smi || true
      - df -h
      - test -f ${DATA_ROOT}/Visual-CoT/annotations/meta_data_lvr_sft_stage1.local.json
      - test -d ${DATA_ROOT}/Visual-CoT/images/cot_image_data
      - mkdir -p ${OUTPUT_ROOT}/stage1-mi200 ${CACHE_ROOT}/hf ${CACHE_ROOT}/run_data
      - >-
        python -c 'import json; from pathlib import Path; src=Path("${DATA_ROOT}/Visual-CoT/annotations/meta_data_lvr_sft_stage1.local.json"); dst=Path("${CACHE_ROOT}/run_data/meta_data_lvr_sft_stage1.mi200.json"); data=json.load(open(src)); old="/datadisk/dataset"; new="${DATA_ROOT}"; [row.update({"data_path": row["data_path"].replace(old,new), "image_folder": row["image_folder"].replace(old,new)}) for row in data]; dst.parent.mkdir(parents=True, exist_ok=True); json.dump(data, open(dst,"w"), indent=2); print("wrote", dst); print(json.dumps(data, indent=2))'
      - test -f ${CACHE_ROOT}/run_data/meta_data_lvr_sft_stage1.mi200.json
      - >-
        python -c 'import json, os; data=json.load(open("${CACHE_ROOT}/run_data/meta_data_lvr_sft_stage1.mi200.json")); missing=[row for row in data if not os.path.exists(row["data_path"]) or not os.path.isdir(row["image_folder"])]; assert not missing, missing; print("amlt mi200 meta preflight ok", len(data))'
      - >-
        bash -lc 'set -euo pipefail &&
        python -c "import sys, torch, transformers, deepspeed; print(\"train python\", sys.executable); print(\"versions\", torch.__version__, torch.version.hip, transformers.__version__, deepspeed.__version__); print(\"cuda alias available\", torch.cuda.is_available(), torch.cuda.device_count())" &&
        cd ${REPO_DIR} &&
        export PYTHONPATH=$$PWD:$$PWD/src:$${PYTHONPATH:-} &&
        export WANDB_MODE=offline &&
        export CACHE_DIR=${CACHE_ROOT}/hf &&
        export HIP_VISIBLE_DEVICES=0,1,2,3,4,5,6,7 &&
        export ROCR_VISIBLE_DEVICES=0,1,2,3,4,5,6,7 &&
        python -m deepspeed --num_gpus=${GPUS} src/train/train_lvr.py
        --run_name "Stage1_8xMI20064_mseLVRLossLambda0.1-MaxVisToken5120-MinVisToken128"
        --coconut True
        --loss_lvr_fct mse
        --deepspeed scripts/zero3_offload.json
        --model_id Qwen/Qwen2.5-VL-7B-Instruct
        --data_path ${CACHE_ROOT}/run_data/meta_data_lvr_sft_stage1.mi200.json
        --remove_unused_columns False
        --lvr_head False
        --freeze_vision_tower True
        --freeze_merger True
        --freeze_llm False
        --max_steps ${MAX_STEPS}
        --learning_rate 1e-5
        --loss_lvr_lambda 0.1
        --bf16 True
        --fp16 False
        --disable_flash_attn2 True
        --online_checkpoint False
        --output_dir ${OUTPUT_ROOT}/stage1-mi200
        --num_train_epochs 1
        --per_device_train_batch_size 1
        --gradient_accumulation_steps ${GRAD_ACCUM_STEPS}
        --image_min_pixels 100352
        --image_max_pixels 4014080
        --weight_decay 0.1
        --warmup_ratio 0.03
        --lr_scheduler_type cosine
        --logging_steps 1
        --tf32 False
        --gradient_checkpointing True
        --report_to none
        --lazy_preprocess True
        --save_strategy steps
        --save_steps 500
        --save_total_limit 10
        --dataloader_num_workers ${DATALOADER_WORKERS}
        --enable_data_packing True
        --max_packed_tokens 16384
        --random_seed 42
        --long_seq_threshold 4096
        --max_instance_per_batch 4
        2>&1 | tee -a ${OUTPUT_ROOT}/${JOB_NAME}.log'
